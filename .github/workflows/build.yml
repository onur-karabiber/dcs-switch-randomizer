name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller PyQt5

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME}
          VER=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "ver=$VER" >> $GITHUB_OUTPUT

      - name: Write version.txt
        shell: bash
        run: echo -n "${{ steps.version.outputs.ver }}" > version.txt

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "dcs-switch-randomizer-${{ steps.version.outputs.tag }}" `
            --clean `
            dcs-switch-randomizer-qt.py

      - name: Create ZIP
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.tag }}"
          $zipName = "dcs-switch-randomizer-$ver"
          New-Item -ItemType Directory -Path $zipName
          Copy-Item "dist\dcs-switch-randomizer-$ver.exe" "$zipName\"
          Copy-Item "version.txt" "$zipName\"
          Copy-Item "DSR" "$zipName\" -Recurse
          Compress-Archive -Path "$zipName" -DestinationPath "$zipName.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dcs-switch-randomizer-${{ steps.version.outputs.tag }}.zip
          generate_release_notes: true